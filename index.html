<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPSS Variable Label 자동 생성</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .description { text-align: center; color: #666; margin-bottom: 30px; line-height: 1.5; }
        
        .upload-box { border: 2px dashed #3498db; padding: 30px; text-align: center; border-radius: 8px; background: #ebf5fb; margin-bottom: 25px; transition: 0.3s; }
        .upload-box:hover { background: #d6eaf8; }
        input[type="file"] { display: none; }
        .file-label { display: inline-block; padding: 12px 24px; background: #3498db; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .file-label:hover { background: #2980b9; }
        #fileName { margin-top: 15px; font-weight: bold; color: #2c3e50; }

        .btn-group { text-align: center; margin-bottom: 25px; }
        button { padding: 10px 25px; margin: 0 5px; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; transition: background 0.2s; }
        .btn-copy { background: #2ecc71; }
        .btn-copy:hover { background: #27ae60; }
        
        #output { width: 100%; height: 350px; padding: 12px; border: 1px solid #ccd1d9; border-radius: 4px; resize: vertical; font-family: monospace; font-size: 14px; box-sizing: border-box; background: #f8f9fa; white-space: pre; overflow-wrap: normal; overflow-x: scroll; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPSS Variable Label 자동 생성기</h1>
        <p class="description">ISAS에서 다운로드한 HTML 파일을 업로드하면,<br>자동으로 MA/SA 등은 떼어내고 질문 라벨만 추출하여 신택스를 만듭니다.</p>
        
        <div class="upload-box">
            <label class="file-label" for="htmlFile">📂 HTML 파일 업로드</label>
            <input type="file" id="htmlFile" accept=".html, .htm" onchange="handleFileUpload(event)">
            <div id="fileName">선택된 파일이 없습니다.</div>
        </div>
        
        <div class="btn-group">
            <button class="btn-copy" onclick="copyOutput()">결과 복사하기</button>
        </div>
        
        <label for="output" style="font-weight: bold; color: #34495e;">생성된 SPSS Syntax:</label>
        <textarea id="output" readonly placeholder="파일을 업로드하면 이곳에 Syntax가 자동 생성됩니다."></textarea>
    </div>

    <script>
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileName').innerText = `📄 업로드된 파일: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                // 한글 깨짐 방지를 위해 인코딩 처리된 텍스트를 읽어옵니다.
                const htmlContent = e.target.result;
                extractDataFromHTML(htmlContent);
            };
            // EUC-KR로 읽어들여 한글 깨짐 방지 (ISAS 파일 특성 반영)
            reader.readAsText(file, 'euc-kr');
        }

        function extractDataFromHTML(htmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            
            let syntaxLabels = [];
            
            // 왼쪽 트리뷰 영역의 모든 a 태그(문항 정보)를 찾습니다.
            const links = doc.querySelectorAll('#syncTreeview a'); 
            
            links.forEach(link => {
                // 재정렬된 문항 번호(빨간색 텍스트)를 감싸는 span 태그 찾기
                const newQSpan = link.querySelector('.questionNumberInformation2');
                
                if (newQSpan && newQSpan.innerText.trim() !== '') {
                    // 1. 변수명 추출: "[Q1]" -> "Q1" 형태로 괄호 제거
                    let varName = newQSpan.innerText.replace(/\[|\]/g, '').trim();
                    
                    // 만약 변수명에 MA, SA, TN, TL, TS, RK 등이 붙어있다면 삭제 (질문번호만 남김)
                    varName = varName.replace(/(MA|SA|TN|TL|TS|RK).*$/i, '');
                    
                    // 2. 라벨(질문) 추출: a 태그 내부의 문항번호 span들을 제거하고 순수 텍스트만 가져오기
                    let clone = link.cloneNode(true);
                    clone.querySelectorAll('span').forEach(span => span.remove());
                    
                    let varLabel = clone.innerText.trim();
                    
                    // 여러 줄바꿈이나 탭을 띄어쓰기 하나로 압축하고, 내부 큰따옴표 충돌 방지
                    varLabel = varLabel.replace(/\s+/g, ' ').replace(/"/g, '""');
                    
                    // 배열에 저장
                    if (varName && varLabel) {
                        syntaxLabels.push(`  ${varName} "${varLabel}"`);
                    }
                }
            });

            // 결과 출력 처리
            if (syntaxLabels.length === 0) {
                alert("파일에서 문항 정보를 찾지 못했습니다.\n재정렬된 문항 번호가 있는 올바른 ISAS HTML 파일인지 확인해주세요.");
                document.getElementById('output').value = "";
                return;
            }

            // 배열을 하나의 문자열로 결합하고 마침표(.) 추가
            let finalSyntax = 'VARIABLE LABELS\n';
            finalSyntax += syntaxLabels.join('\n');
            finalSyntax += '.\nEXECUTE.';
            
            document.getElementById('output').value = finalSyntax;
        }

        function copyOutput() {
            const outputArea = document.getElementById('output');
            if (!outputArea.value) {
                alert('복사할 내용이 없습니다.');
                return;
            }
            outputArea.select();
            document.execCommand('copy');
            alert('클립보드에 복사되었습니다!\nSPSS 신택스 창에 바로 붙여넣기 하세요.');
            window.getSelection().removeAllRanges();
        }
    </script>
</body>
</html>
