<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPSS 라벨 자동 생성기</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 40px 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .upload-box { border: 2px dashed #3498db; padding: 40px; text-align: center; border-radius: 8px; background: #ebf5fb; margin-bottom: 25px; transition: 0.3s; }
        .upload-box:hover { background: #d6eaf8; }
        input[type="file"] { display: none; }
        .file-label { display: inline-block; padding: 12px 24px; background: #3498db; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; font-size: 16px; }
        .file-label:hover { background: #2980b9; }
        #fileName { margin-top: 15px; font-weight: bold; color: #2c3e50; }

        .option-group { text-align: center; margin-bottom: 30px; }
        .option-group label { cursor: pointer; font-weight: bold; color: #34495e; font-size: 15px; user-select: none; }
        .option-group input[type="checkbox"] { transform: scale(1.2); margin-right: 8px; cursor: pointer; }

        .output-grid { display: flex; gap: 20px; flex-direction: column; }
        .output-box-container { border: 1px solid #e0e6ed; border-radius: 6px; padding: 15px; background: #fdfdfd; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .output-header label { font-weight: bold; color: #2c3e50; font-size: 16px; }
        
        button.btn-copy { padding: 6px 15px; border: none; border-radius: 4px; font-size: 13px; font-weight: bold; cursor: pointer; color: white; transition: background 0.2s; background: #2ecc71; }
        button.btn-copy:hover { background: #27ae60; }
        
        textarea { width: 100%; height: 250px; padding: 12px; border: 1px solid #ccd1d9; border-radius: 4px; resize: vertical; font-family: monospace; font-size: 14px; box-sizing: border-box; background: white; white-space: pre; overflow-wrap: normal; overflow-x: scroll; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPSS 라벨 자동 생성기</h1>
        
        <div class="upload-box">
            <label class="file-label" for="htmlFile">📂 HTML 파일 업로드</label>
            <input type="file" id="htmlFile" accept=".html, .htm" onchange="handleFileUpload(event)">
            <div id="fileName">선택된 파일이 없습니다.</div>
        </div>
        
        <div class="option-group">
            <label>
                <input type="checkbox" id="addRename" checked onchange="toggleRenameBox()"> RENAME 구문 생성 활성화
            </label>
        </div>

        <div class="output-grid">
            <div class="output-box-container">
                <div class="output-header">
                    <label>1. VARIABLE LABELS Syntax</label>
                    <button class="btn-copy" onclick="copyText('output_labels')">라벨 복사하기</button>
                </div>
                <textarea id="output_labels" readonly placeholder="파일을 업로드하면 Variable Labels 구문이 이곳에 생성됩니다."></textarea>
            </div>

            <div class="output-box-container" id="rename_container">
                <div class="output-header">
                    <label>2. RENAME VARIABLES Syntax</label>
                    <button class="btn-copy" onclick="copyText('output_rename')">리네임 복사하기</button>
                </div>
                <textarea id="output_rename" readonly placeholder="파일을 업로드하면 Rename Variables 구문이 이곳에 생성됩니다."></textarea>
            </div>
        </div>
    </div>

    <script>
        function toggleRenameBox() {
            const isChecked = document.getElementById('addRename').checked;
            document.getElementById('rename_container').style.display = isChecked ? 'block' : 'none';
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileName').innerText = `📄 업로드된 파일: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                extractDataFromHTML(e.target.result);
            };
            reader.readAsText(file, 'euc-kr');
        }

        function findInputForSpan(span) {
            let curr = span.previousElementSibling;
            while (curr) {
                if (['INPUT', 'TEXTAREA'].includes(curr.tagName)) return curr;
                curr = curr.previousElementSibling;
            }
            let parent = span.parentElement;
            if (parent) {
                let inputs = Array.from(parent.querySelectorAll('input, textarea'));
                if (inputs.length > 0) {
                    let precedingInputs = inputs.filter(inp => 
                        inp.compareDocumentPosition(span) & Node.DOCUMENT_POSITION_FOLLOWING
                    );
                    if (precedingInputs.length > 0) {
                        return precedingInputs[precedingInputs.length - 1];
                    }
                    return inputs[0];
                }
            }
            return null;
        }

        function extractDataFromHTML(htmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            
            const isRenameEnabled = document.getElementById('addRename').checked;
            
            let syntaxLabels = [];
            let renamePairs = []; 
            let seenVars = new Set(); 

            const questions = doc.querySelectorAll('.ISAS5');
            const treeLinks = Array.from(doc.querySelectorAll('#syncTreeview a'));
            
            questions.forEach(qBlock => {
                const qId = qBlock.id;
                if (/^E\d+/i.test(qId)) return;

                const treeLink = treeLinks.find(a => {
                    let href = a.getAttribute('href') || '';
                    let hashPart = href.split('#')[1];
                    return hashPart === qId;
                });
                if (!treeLink) return;

                let clone = treeLink.cloneNode(true);
                clone.querySelectorAll('span').forEach(span => span.remove());
                let mainLabel = clone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');

                let prefixMatch = mainLabel.match(/^([A-Za-z]+[0-9]+(?:-[0-9]+)?)\.?/);
                let targetPrefix = prefixMatch ? prefixMatch[1].replace(/-/g, '_') : null;

                const varSpans = qBlock.querySelectorAll('.variableinformation2');
                if (varSpans.length === 0) return;

                let varsInBlock = [];

                varSpans.forEach(span => {
                    let rawVar = span.innerText.replace(/\[|\]/g, '').trim(); 
                    let inputEl = findInputForSpan(span);
                    let casetype = inputEl ? inputEl.getAttribute('casetype') : '';

                    let qMatch = rawVar.match(/^(Q\d+)/i);
                    let baseQ = qMatch ? qMatch[1].toUpperCase() : rawVar.replace(/(MA|SA|TN|TL|TS|RK).*$/i, '');

                    let valMatch = rawVar.match(/[:_]?(\d+)$/);
                    let vVal = valMatch ? valMatch[1] : "";

                    let typeMatch = rawVar.match(/(MA|SA|TN|TL|TS|RK)/i);
                    let vType = typeMatch ? typeMatch[1].toUpperCase() : (casetype ? casetype.toUpperCase() : 'SA');

                    varsInBlock.push({
                        rawVar, baseQ, vType, vVal, span, input: inputEl,
                        cell: span.closest('td, th'),
                        row: span.closest('tr')
                    });
                });

                let saBases = Array.from(new Set(varsInBlock.filter(v => v.vType === 'SA').map(v => v.baseQ)));
                let isGridSA = saBases.length > 1;

                // 변수별 타입 분석 및 이름 규칙 세팅
                varsInBlock.forEach(item => {
                    let isTextType = ['TS', 'TL', 'TN'].includes(item.vType);
                    let sameBaseVars = varsInBlock.filter(v => v.baseQ === item.baseQ);
                    let hasChoiceInBase = sameBaseVars.some(v => ['SA', 'MA', 'RK'].includes(v.vType));
                    let hasMA = sameBaseVars.some(v => v.vType === 'MA');
                    let hasSA = sameBaseVars.some(v => v.vType === 'SA');
                    let hasRK = sameBaseVars.some(v => v.vType === 'RK');

                    item.hasChoiceInBase = hasChoiceInBase;

                    if (isTextType && hasChoiceInBase) {
                        if (hasMA) {
                            // MA 기타 텍스트 (Q8_6A)
                            item.spssVarName = item.vVal ? `${item.baseQ}_${item.vVal}A` : `${item.baseQ}A`;
                            item.isMAOther = true;
                        } else if (hasSA || hasRK) {
                            // SA 기타 텍스트 (Q9_5)
                            item.spssVarName = item.vVal ? `${item.baseQ}_${item.vVal}` : `${item.baseQ}_OTHER`;
                            item.isSAOther = true;
                        }
                    } else if (item.vType === 'SA') {
                        item.spssVarName = item.baseQ;
                    } else if (isTextType && !hasChoiceInBase) {
                        // 🔥 Pure TS/TN/TL (SA/MA 없이 TS만 있는 경우 -> Q34TS1 -> Q34_1)
                        item.spssVarName = item.vVal ? `${item.baseQ}_${item.vVal}` : item.baseQ;
                        item.isPureText = true;
                    } else {
                        item.spssVarName = item.vVal ? `${item.baseQ}_${item.vVal}` : item.baseQ;
                    }
                });

                let tables = qBlock.querySelectorAll('table[tabletype="CASE"]');
                let tableHeaders = new Map();

                tables.forEach(table => {
                    let rows = table.querySelectorAll('tr');
                    let colHeaders = [];
                    if (rows.length > 0) {
                        let firstRowCells = rows[0].querySelectorAll('td, th');
                        firstRowCells.forEach(cell => {
                            let cClone = cell.cloneNode(true);
                            cClone.querySelectorAll('label, input, textarea, span.variableinformation, span.variableinformation2').forEach(e => e.remove());
                            colHeaders.push(cClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""'));
                        });
                    }
                    let rowHeaders = [];
                    rows.forEach(row => {
                        let cells = row.querySelectorAll('td, th');
                        let rHead = "";
                        if (cells.length > 0) {
                            let cClone = cells[0].cloneNode(true);
                            cClone.querySelectorAll('label, input, textarea, span.variableinformation, span.variableinformation2').forEach(e => e.remove());
                            rHead = cClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');
                        }
                        rowHeaders.push(rHead);
                    });
                    tableHeaders.set(table, { cols: colHeaders, rows: rowHeaders });
                });

                let seenInBlock = new Set();

                varsInBlock.forEach(item => {
                    let finalVarName = item.spssVarName;

                    if (seenInBlock.has(finalVarName)) return;
                    seenInBlock.add(finalVarName);

                    if (seenVars.has(finalVarName)) return;
                    seenVars.add(finalVarName);

                    let finalLabel = mainLabel;
                    let renameTarget = null;
                    let varsForThisBase = varsInBlock.filter(v => v.baseQ === item.baseQ);

                    if (item.vType === 'SA') {
                        if (isGridSA) {
                            let gridIdx = saBases.indexOf(item.baseQ) + 1;
                            let subLabel = getSubLabel(item, true, varsForThisBase, tableHeaders);
                            finalLabel = subLabel ? `${mainLabel}_${gridIdx}) ${subLabel}` : `${mainLabel}_${gridIdx})`;
                            renameTarget = targetPrefix ? `${targetPrefix}_${gridIdx}` : null;
                        } else {
                            finalLabel = mainLabel;
                            renameTarget = targetPrefix;
                        }
                    } 
                    else if (item.vType === 'MA') {
                        let subLabel = getSubLabel(item, false, [], tableHeaders);
                        finalLabel = subLabel ? `${mainLabel}_${item.vVal}) ${subLabel}` : `${mainLabel}_${item.vVal})`;
                        renameTarget = targetPrefix ? (item.vVal ? `${targetPrefix}_${item.vVal}` : targetPrefix) : null;
                    } 
                    else if (item.vType === 'RK') {
                        let subLabel = getSubLabel(item, false, [], tableHeaders);
                        finalLabel = subLabel ? `${mainLabel}_${item.vVal}순위) ${subLabel}` : `${mainLabel}_${item.vVal}순위)`;
                        renameTarget = targetPrefix ? (item.vVal ? `${targetPrefix}_${item.vVal}` : targetPrefix) : null;
                    } 
                    else if (['TS', 'TL', 'TN'].includes(item.vType)) {
                        if (item.isMAOther) {
                            let subLabel = getSubLabel(item, false, [], tableHeaders);
                            finalLabel = subLabel ? `${mainLabel}_${item.vVal}) ${subLabel}` : `${mainLabel}_${item.vVal})`;
                            renameTarget = targetPrefix ? `${targetPrefix}_${item.vVal}A` : null;
                        } else if (item.isSAOther) {
                            finalLabel = mainLabel; 
                            renameTarget = targetPrefix ? `${targetPrefix}_${item.vVal}` : null;
                        } else {
                            // Pure TS/TN/TL (Q34_1, Q34_2, Q4_1)
                            let subLabel = getSubLabel(item, false, [], tableHeaders);
                            
                            if (subLabel) {
                                finalLabel = `${mainLabel}_${subLabel}`;
                            } else {
                                finalLabel = (varsForThisBase.length > 1 && item.vVal) ? `${mainLabel}_${item.vVal})` : mainLabel;
                            }
                            renameTarget = targetPrefix ? (item.vVal ? `${targetPrefix}_${item.vVal}` : targetPrefix) : null;
                        }
                    }

                    syntaxLabels.push(`  ${finalVarName} "${finalLabel}"`);
                    
                    if (isRenameEnabled && renameTarget && finalVarName !== renameTarget) {
                        renamePairs.push(`  (${finalVarName} = ${renameTarget})`);
                    }
                });
            });

            if (syntaxLabels.length === 0) {
                alert("파일에서 문항 정보를 추출하지 못했습니다.\n재정렬된 데이터가 포함된 파일인지 확인해주세요.");
                document.getElementById('output_labels').value = "";
                document.getElementById('output_rename').value = "";
                return;
            }

            document.getElementById('output_labels').value = 'VARIABLE LABELS\n' + syntaxLabels.join('\n') + '.\nEXECUTE.';

            if (renamePairs.length > 0) {
                document.getElementById('output_rename').value = 'RENAME VARIABLES\n' + renamePairs.join('\n') + '.\nEXECUTE.';
            } else {
                document.getElementById('output_rename').value = '/* 변경할 변수명이 없습니다 */';
            }
        }

        function getSubLabel(item, isGridSA, allInputsForVar, tableHeaders) {
            let row = item.row;

            // 1. 행(tr) 안에 th가 존재하는 테이블형 주관식(Q0 정보 입력 등)인 경우 th 텍스트 최우선 활용
            if (row) {
                let th = row.querySelector('th');
                if (th) {
                    let tClone = th.cloneNode(true);
                    tClone.querySelectorAll('span.variableinformation, span.variableinformation2, script, style').forEach(e => e.remove());
                    let text = tClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');
                    if (text) return text;
                }
            }

            // 2. 단독 주관식/숫자형(TN, TS)의 경우 입력창 앞뒤 텍스트 결합 (단, 하이픈 등 기호만 있는 텍스트는 제외)
            if (['TN', 'TS', 'TL'].includes(item.vType) && !item.hasChoiceInBase) {
                let container = item.span.closest('td, th, p, div, li');
                if (container) {
                    let cClone = container.cloneNode(true);
                    cClone.querySelectorAll('input, textarea, span.variableinformation, span.variableinformation2, img, script, br').forEach(e => e.remove());
                    let text = cClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');
                    if (text && !/^[\s\-_:=;.,]+$/.test(text) && text !== item.vVal) return text;
                }
            }

            let cell = item.cell;
            if (!cell) return "";

            // 3. 일반 보기(Label) 텍스트 추출
            let labelEl = cell.querySelector('label');
            if (labelEl) {
                let lClone = labelEl.cloneNode(true);
                lClone.querySelectorAll('input, textarea, span.variableinformation, span.variableinformation2').forEach(e => e.remove());
                let text = lClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');
                if (text) return text;
            }

            // 4. 표(Grid) 행/열 헤더 추출
            let table = cell.closest('table');
            let headers = tableHeaders.get(table);
            if (!headers) return "";

            let rIdx = Array.from(table.querySelectorAll('tr')).indexOf(row);
            let cellsArray = Array.from(row.querySelectorAll('td, th'));
            let cIdx = cellsArray.indexOf(cell);

            let rHead = headers.rows[rIdx] || "";
            let cHead = headers.cols[cIdx] || "";

            if (isGridSA && allInputsForVar.length > 1) {
                let rowsSet = new Set(allInputsForVar.map(i => i.row));
                let colsSet = new Set(allInputsForVar.map(i => Array.from(i.row.querySelectorAll('td, th')).indexOf(i.cell)));

                if (rowsSet.size > 1 && colsSet.size === 1) return cHead || rHead;
                if (colsSet.size > 1 && rowsSet.size === 1) return rHead || cHead;
            }

            return [rHead, cHead].filter(Boolean).join(" - ");
        }

        function copyText(elementId) {
            const outputArea = document.getElementById(elementId);
            if (!outputArea.value || outputArea.value.includes('/* 변경할 변수명이 없습니다 */')) {
                alert('복사할 내용이 없습니다.');
                return;
            }
            outputArea.select();
            document.execCommand('copy');
            alert('클립보드에 복사되었습니다!');
            window.getSelection().removeAllRanges();
        }
    </script>
</body>
</html>
