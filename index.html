<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPSS Variable Label 생성기</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f7f6; 
            padding: 20px; 
            color: #333;
        }
        .container { 
            max-width: 800px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .description { text-align: center; color: #666; margin-bottom: 30px; }
        
        .input-group { display: flex; gap: 20px; margin-bottom: 20px; }
        .input-box { flex: 1; display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: bold; color: #34495e; }
        textarea { 
            width: 100%; 
            height: 250px; 
            padding: 12px; 
            border: 1px solid #ccd1d9; 
            border-radius: 4px; 
            resize: vertical;
            font-family: monospace;
            box-sizing: border-box;
        }
        textarea:focus { outline: none; border-color: #3498db; }
        
        .btn-group { text-align: center; margin-bottom: 25px; }
        button { 
            padding: 10px 25px; 
            margin: 0 5px;
            border: none; 
            border-radius: 4px; 
            font-size: 15px;
            font-weight: bold;
            cursor: pointer; 
            transition: background 0.2s;
            color: white;
        }
        .btn-generate { background: #3498db; }
        .btn-generate:hover { background: #2980b9; }
        .btn-copy { background: #2ecc71; }
        .btn-copy:hover { background: #27ae60; }
        .btn-clear { background: #e74c3c; }
        .btn-clear:hover { background: #c0392b; }
        
        .output-box { display: flex; flex-direction: column; }
        #output { 
            height: 200px; 
            background: #f8f9fa; 
            cursor: text; 
            border-color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPSS Variable Label 생성기</h1>
        <p class="description">엑셀에서 '변수명' 열과 '설명(레이블)' 열을 각각 복사해서 붙여넣으세요.</p>
        
        <div class="input-group">
            <div class="input-box">
                <label for="varNames">변수명 (Variable Names)</label>
                <textarea id="varNames" placeholder="예시:&#10;Q1_1&#10;Q1_2&#10;Q2"></textarea>
            </div>
            <div class="input-box">
                <label for="varLabels">변수 설명 (Variable Labels)</label>
                <textarea id="varLabels" placeholder="예시:&#10;서비스 만족도&#10;가격 만족도&#10;재구매 의향"></textarea>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-generate" onclick="generateSyntax()">Syntax 생성하기</button>
            <button class="btn-copy" onclick="copyOutput()">결과 복사하기</button>
            <button class="btn-clear" onclick="clearFields()">초기화</button>
        </div>
        
        <div class="output-box">
            <label for="output">생성된 SPSS Syntax:</label>
            <textarea id="output" readonly placeholder="생성된 Syntax가 여기에 표시됩니다."></textarea>
        </div>
    </div>

    <script>
        function generateSyntax() {
            // 입력값 가져오기
            const namesText = document.getElementById('varNames').value.trim();
            const labelsText = document.getElementById('varLabels').value.trim();
            
            // 빈 값 체크
            if (!namesText || !labelsText) {
                alert('변수명과 변수 설명을 모두 입력해주세요.');
                return;
            }
            
            // 줄바꿈을 기준으로 배열로 변환 (빈 줄 제거)
            const names = namesText.split('\n').map(n => n.trim()).filter(n => n !== '');
            const labels = labelsText.split('\n').map(l => l.trim()).filter(l => l !== '');
            
            // 개수 불일치 경고
            if (names.length !== labels.length) {
                alert(`[주의] 변수명 개수(${names.length}개)와 레이블 개수(${labels.length}개)가 다릅니다!\n짝이 맞지 않는 데이터가 없는지 확인해주세요.`);
            }
            
            // Syntax 생성 시작
            let syntax = 'VARIABLE LABELS\n';
            const maxLength = Math.min(names.length, labels.length);
            
            for (let i = 0; i < maxLength; i++) {
                // 레이블 내에 큰따옴표가 있을 경우 문법 오류를 막기 위해 처리 (SPSS는 큰따옴표 안의 큰따옴표를 2개로 씀)
                let safeLabel = labels[i].replace(/"/g, '""'); 
                
                // 쌍따옴표로 묶어서 레이블 지정
                syntax += `  ${names[i]} "${safeLabel}"`;
                
                // 마지막 줄에는 마침표(.)를, 그 외에는 줄바꿈만 추가
                if (i === maxLength - 1) {
                    syntax += '.\n';
                } else {
                    syntax += '\n';
                }
            }
            
            // 실행 명령어 추가
            syntax += 'EXECUTE.';
            
            // 결과 출력
            document.getElementById('output').value = syntax;
        }

        function copyOutput() {
            const outputArea = document.getElementById('output');
            if (!outputArea.value) {
                alert('복사할 내용이 없습니다. 먼저 Syntax를 생성해주세요.');
                return;
            }
            outputArea.select();
            document.execCommand('copy');
            alert('클립보드에 복사되었습니다!\nSPSS 신택스 창(Syntax Editor)에 붙여넣기 하세요.');
            
            // 선택 해제
            window.getSelection().removeAllRanges();
        }

        function clearFields() {
            if(confirm('입력한 내용을 모두 지우시겠습니까?')) {
                document.getElementById('varNames').value = '';
                document.getElementById('varLabels').value = '';
                document.getElementById('output').value = '';
            }
        }
    </script>
</body>
</html>
