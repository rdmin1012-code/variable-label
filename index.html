<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPSS Variable Label 자동 생성기 (파일 업로드형)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .description { text-align: center; color: #666; margin-bottom: 30px; }
        
        .upload-box { border: 2px dashed #3498db; padding: 30px; text-align: center; border-radius: 8px; background: #ebf5fb; margin-bottom: 25px; transition: 0.3s; }
        .upload-box:hover { background: #d6eaf8; }
        input[type="file"] { display: none; }
        .file-label { display: inline-block; padding: 12px 24px; background: #3498db; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .file-label:hover { background: #2980b9; }
        #fileName { margin-top: 15px; font-weight: bold; color: #2c3e50; }

        .btn-group { text-align: center; margin-bottom: 25px; }
        button { padding: 10px 25px; margin: 0 5px; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; }
        .btn-copy { background: #2ecc71; }
        .btn-copy:hover { background: #27ae60; }
        
        #output { width: 100%; height: 300px; padding: 12px; border: 1px solid #ccd1d9; border-radius: 4px; resize: vertical; font-family: monospace; box-sizing: border-box; background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPSS Variable Label 자동 생성기</h1>
        <p class="description">HTML 파일을 업로드하면 자동으로 변수명과 설명을 추출하여 신택스를 만듭니다.</p>
        
        <div class="upload-box">
            <label class="file-label" for="htmlFile">HTML 파일 선택하기</label>
            <input type="file" id="htmlFile" accept=".html, .htm" onchange="handleFileUpload(event)">
            <div id="fileName">선택된 파일이 없습니다.</div>
        </div>
        
        <div class="btn-group">
            <button class="btn-copy" onclick="copyOutput()">결과 복사하기</button>
        </div>
        
        <label for="output" style="font-weight: bold; color: #34495e;">생성된 SPSS Syntax:</label>
        <textarea id="output" readonly placeholder="HTML 파일을 업로드하면 이곳에 Syntax가 자동 생성됩니다."></textarea>
    </div>

    <script>
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileName').innerText = `📄 업로드된 파일: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const htmlContent = e.target.result;
                extractDataFromHTML(htmlContent);
            };
            reader.readAsText(file);
        }

        function extractDataFromHTML(htmlString) {
            // 1. 업로드된 텍스트를 실제 HTML 구조로 변환
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            
            let syntax = 'VARIABLE LABELS\n';
            let dataFound = false;

            /* =========================================================
               [중요] 여기서부터 HTML 구조에 맞게 데이터를 뽑아내는 로직이 들어갑니다.
               지금은 임시로 'td' 태그를 찾는 예시 코드를 넣어두었습니다.
               ========================================================= */
            
            // 예시: 파일 안의 모든 테이블(table)의 행(tr)을 찾아서 읽음
            const rows = doc.querySelectorAll('tr'); 
            
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                // 만약 첫 번째 칸이 변수명, 두 번째 칸이 레이블이라면? (가정)
                if (cells.length >= 2) {
                    const varName = cells[0].innerText.trim();
                    let varLabel = cells[1].innerText.trim().replace(/"/g, '""');
                    
                    if (varName && varLabel) {
                        syntax += `  ${varName} "${varLabel}"\n`;
                        dataFound = true;
                    }
                }
            });

            if (!dataFound) {
                alert("파일에서 변수명과 레이블을 찾지 못했습니다. HTML 구조 확인이 필요합니다!");
                document.getElementById('output').value = "";
                return;
            }

            syntax += 'EXECUTE.';
            document.getElementById('output').value = syntax;
        }

        function copyOutput() {
            const outputArea = document.getElementById('output');
            if (!outputArea.value) {
                alert('복사할 내용이 없습니다.');
                return;
            }
            outputArea.select();
            document.execCommand('copy');
            alert('클립보드에 복사되었습니다!');
            window.getSelection().removeAllRanges();
        }
    </script>
</body>
</html>
