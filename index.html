<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SPSS 라벨 자동 생성기</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        /* 설명이 빠졌으므로 제목 아래 여백을 25px로 늘려주어 밸런스를 맞췄습니다 */
        h1 { text-align: center; color: #2c3e50; margin-bottom: 25px; } 
        
        .upload-box { border: 2px dashed #3498db; padding: 30px; text-align: center; border-radius: 8px; background: #ebf5fb; margin-bottom: 25px; transition: 0.3s; }
        .upload-box:hover { background: #d6eaf8; }
        input[type="file"] { display: none; }
        .file-label { display: inline-block; padding: 12px 24px; background: #3498db; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .file-label:hover { background: #2980b9; }
        #fileName { margin-top: 15px; font-weight: bold; color: #2c3e50; }

        .btn-group { text-align: center; margin-bottom: 25px; }
        button { padding: 10px 25px; margin: 0 5px; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; transition: background 0.2s; }
        .btn-copy { background: #2ecc71; }
        .btn-copy:hover { background: #27ae60; }
        
        #output { width: 100%; height: 400px; padding: 12px; border: 1px solid #ccd1d9; border-radius: 4px; resize: vertical; font-family: monospace; font-size: 14px; box-sizing: border-box; background: #f8f9fa; white-space: pre; overflow-wrap: normal; overflow-x: scroll; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SPSS 라벨 자동 생성기</h1>
        
        <div class="upload-box">
            <label class="file-label" for="htmlFile">📂 HTML 파일 업로드</label>
            <input type="file" id="htmlFile" accept=".html, .htm" onchange="handleFileUpload(event)">
            <div id="fileName">선택된 파일이 없습니다.</div>
        </div>
        
        <div class="btn-group">
            <button class="btn-copy" onclick="copyOutput()">결과 복사하기</button>
        </div>
        
        <label for="output" style="font-weight: bold; color: #34495e;">생성된 SPSS Syntax:</label>
        <textarea id="output" readonly placeholder="파일을 업로드하면 이곳에 Syntax가 자동 생성됩니다."></textarea>
    </div>

    <script>
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileName').innerText = `📄 업로드된 파일: ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                extractDataFromHTML(e.target.result);
            };
            // ISAS 파일의 한글 깨짐 방지를 위해 euc-kr 지정
            reader.readAsText(file, 'euc-kr');
        }

        function extractDataFromHTML(htmlString) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');
            
            let syntaxLabels = [];
            let seenVars = new Set(); // 중복 생성 방지용

            const questions = doc.querySelectorAll('.ISAS5');
            
            questions.forEach(qBlock => {
                const qId = qBlock.id;
                
                // E로 시작하는 단순 설명/안내 박스(E1, E2 등)는 스킵
                if (/^E\d+/i.test(qId)) return;

                const treeLink = doc.querySelector(`#syncTreeview a[href*="#${qId}"]`);
                if (!treeLink) return;

                // 1. 큰 질문(Main Label) 추출
                let clone = treeLink.cloneNode(true);
                clone.querySelectorAll('span').forEach(span => span.remove());
                let mainLabel = clone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');

                // 2. 이 문항에 속한 모든 변수 찾기
                const varSpans = qBlock.querySelectorAll('.variableinformation2');
                if (varSpans.length === 0) return;

                let blockVarsMap = new Map();

                varSpans.forEach(span => {
                    let rawVar = span.innerText.replace(/\[|\]/g, '').trim(); 
                    
                    let inputEl = span.closest('label')?.querySelector('input') || span.previousElementSibling;
                    if(!inputEl || inputEl.tagName !== 'INPUT') {
                        inputEl = span.parentElement.querySelector('input');
                    }
                    let casetype = inputEl ? inputEl.getAttribute('casetype') : '';

                    // 변수명 정제 (Q26SA -> Q26)
                    let qMatch = rawVar.match(/^(Q\d+)/i);
                    let newBase = qMatch ? qMatch[1].toUpperCase() : rawVar.replace(/(MA|SA|TN|TL|TS|RK).*$/i, '');

                    // 뒤에 붙은 값 추출 (예: :1 또는 _1 -> 1)
                    let valMatch = rawVar.match(/[:_](\d+)$|(\d+)$/);
                    let valPart = valMatch ? (valMatch[1] || valMatch[2]) : "";

                    // SA 문항인지 MULTI 문항인지 구분
                    let type = (casetype === 'SA' || (!casetype && /SA/i.test(rawVar))) ? 'SA' : 'MULTI';

                    if (!blockVarsMap.has(newBase)) {
                        blockVarsMap.set(newBase, { type: type, inputs: [] });
                    }
                    blockVarsMap.get(newBase).inputs.push({
                        val: valPart,
                        span: span,
                        input: inputEl,
                        cell: span.closest('td, th'),
                        row: span.closest('tr')
                    });
                });

                let saVariables = Array.from(blockVarsMap.values()).filter(v => v.type === 'SA');
                let isGridSA = saVariables.length > 1;

                // 3. 테이블 행(Row), 열(Col) 제목 파악
                let tables = qBlock.querySelectorAll('table[tabletype="CASE"]');
                let tableHeaders = new Map();

                tables.forEach(table => {
                    let rows = table.querySelectorAll('tr');
                    let colHeaders = [];
                    if (rows.length > 0) {
                        let firstRowCells = rows[0].querySelectorAll('td, th');
                        firstRowCells.forEach(cell => {
                            let cClone = cell.cloneNode(true);
                            cClone.querySelectorAll('label, input, span.variableinformation, span.variableinformation2').forEach(e => e.remove());
                            colHeaders.push(cClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""'));
                        });
                    }
                    let rowHeaders = [];
                    rows.forEach(row => {
                        let cells = row.querySelectorAll('td, th');
                        let rHead = "";
                        if (cells.length > 0) {
                            let cClone = cells[0].cloneNode(true);
                            cClone.querySelectorAll('label, input, span.variableinformation, span.variableinformation2').forEach(e => e.remove());
                            rHead = cClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');
                        }
                        rowHeaders.push(rHead);
                    });
                    tableHeaders.set(table, { cols: colHeaders, rows: rowHeaders });
                });

                // 4. 최종 Syntax 생성 (순번 카운터 적용)
                let gridCounter = 1; // 그리드 문항용 순번 카운터

                blockVarsMap.forEach((varData, newBase) => {
                    // (A) 다중선택(MA/TN 등) 문항 처리
                    if (varData.type === 'MULTI') {
                        varData.inputs.forEach(item => {
                            let finalVarName = item.val ? `${newBase}_${item.val}` : newBase;
                            if (seenVars.has(finalVarName)) return;

                            let subLabel = getSubLabel(item, false, [], tableHeaders);
                            let finalLabel = mainLabel;
                            
                            // MA도 통일성을 위해 _1) 텍스트 형태로 결합
                            if (subLabel) {
                                finalLabel = item.val ? `${mainLabel}_${item.val}) ${subLabel}` : `${mainLabel}_${subLabel}`;
                            } else if (item.val) {
                                finalLabel = `${mainLabel}_${item.val})`;
                            }
                            
                            syntaxLabels.push(`  ${finalVarName} "${finalLabel}"`);
                            seenVars.add(finalVarName);
                        });
                    } 
                    // (B) 단일선택(SA) 문항 처리 (C3, T1 등 그리드 포함)
                    else {
                        let finalVarName = newBase;
                        if (seenVars.has(finalVarName)) return;

                        let finalLabel = mainLabel;
                        
                        // 표(Grid) 문항일 경우 순차적으로 번호 매기기 (_1), _2) ...)
                        if (isGridSA) {
                            let subLabel = getSubLabel(varData.inputs[0], true, varData.inputs, tableHeaders);
                            if (subLabel) {
                                finalLabel = `${mainLabel}_${gridCounter}) ${subLabel}`;
                            } else {
                                finalLabel = `${mainLabel}_${gridCounter})`;
                            }
                            gridCounter++; // 다음 변수를 위해 카운터 증가
                        }
                        
                        syntaxLabels.push(`  ${finalVarName} "${finalLabel}"`);
                        seenVars.add(finalVarName);
                    }
                });
            });

            if (syntaxLabels.length === 0) {
                alert("파일에서 문항 정보를 추출하지 못했습니다.\n재정렬된 데이터가 포함된 파일인지 확인해주세요.");
                document.getElementById('output').value = "";
                return;
            }

            let finalSyntax = 'VARIABLE LABELS\n' + syntaxLabels.join('\n') + '.\nEXECUTE.';
            document.getElementById('output').value = finalSyntax;
        }

        // 보조 라벨(표의 행/열 제목 등)을 찾아주는 함수
        function getSubLabel(item, isGridSA, allInputsForVar, tableHeaders) {
            let cell = item.cell;
            if (!cell) return "";

            let labelEl = cell.querySelector('label');
            if (labelEl) {
                let lClone = labelEl.cloneNode(true);
                lClone.querySelectorAll('input, span.variableinformation, span.variableinformation2').forEach(e => e.remove());
                let text = lClone.innerText.trim().replace(/\s+/g, ' ').replace(/"/g, '""');
                if (text) return text;
            }

            let table = cell.closest('table');
            let headers = tableHeaders.get(table);
            if (!headers) return "";

            let row = item.row;
            let rIdx = Array.from(table.querySelectorAll('tr')).indexOf(row);
            let cellsArray = Array.from(row.querySelectorAll('td, th'));
            let cIdx = cellsArray.indexOf(cell);

            let rHead = headers.rows[rIdx] || "";
            let cHead = headers.cols[cIdx] || "";

            if (isGridSA && allInputsForVar.length > 1) {
                let rowsSet = new Set(allInputsForVar.map(i => i.row));
                let colsSet = new Set(allInputsForVar.map(i => Array.from(i.row.querySelectorAll('td, th')).indexOf(i.cell)));

                if (rowsSet.size > 1 && colsSet.size === 1) return cHead || rHead;
                if (colsSet.size > 1 && rowsSet.size === 1) return rHead || cHead;
            }

            return [rHead, cHead].filter(Boolean).join(" - ");
        }

        function copyOutput() {
            const outputArea = document.getElementById('output');
            if (!outputArea.value) {
                alert('복사할 내용이 없습니다.');
                return;
            }
            outputArea.select();
            document.execCommand('copy');
            alert('클립보드에 복사되었습니다!\nSPSS Syntax Editor 창에 붙여넣기 하세요.');
            window.getSelection().removeAllRanges();
        }
    </script>
</body>
</html>
